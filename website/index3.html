<script>
  const btn = document.getElementById('btn-get-started');
  btn.addEventListener('mouseenter', () => {
    btn.style.transform = 'translateY(-2px)';
    btn.style.boxShadow = '0 8px 24px rgba(81,62,228,0.5)';
  });
  btn.addEventListener('mouseleave', () => {
    btn.style.transform = '';
    btn.style.boxShadow = '0 4px 16px rgba(81,62,228,0.4)';
  });

  function resize() {
    const app = document.getElementById('app-container');
    const scale = Math.min(window.innerWidth / 450, window.innerHeight / 970);
    if (scale < 1) {
      app.style.transform = `scale(${scale})`;
      app.style.transformOrigin = 'top center';
    } else {
      app.style.transform = 'none';
      app.style.marginTop = '10px';
    }
  }
  window.addEventListener('resize', resize);
  resize();
</script>
