    <script>
        function resize() {
            const app = document.getElementById('app');
            const scale = Math.min(window.innerWidth / 450, 1);
            if (scale < 1) {
                app.style.transform = `scale(${scale})`;
            } else {
                app.style.transform = 'none';
            }
        }
        window.addEventListener('resize', resize);
        resize();
        
        // Prevent spam clicking
        let isShooting = false;
        
        function shoot(element, targetX, targetY) {
            if (isShooting) return;
            isShooting = true;
            
            const proj = document.getElementById('projectile');
            const origGroup = document.getElementById('aim-group');
            const svgLayer = document.getElementById('drawing-layer');
            
            // Pivot is at the bottom center of the aiming group
            const startX = parseInt(origGroup.style.left) + origGroup.offsetWidth / 2;
            const startY = parseInt(origGroup.style.top) + origGroup.offsetHeight;
            
            const dx = targetX - startX;
            const dy = targetY - startY;
            const distance = Math.sqrt(dx * dx + dy * dy);
            
            // 1. SVG DRAWING PHASE (Aim)
            // Hide the static aiming group
            origGroup.style.opacity = '0';
            
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
            line.setAttribute('x1', startX);
            line.setAttribute('y1', startY);
            line.setAttribute('x2', targetX);
            line.setAttribute('y2', targetY);
            line.setAttribute('stroke', 'rgba(255, 255, 255, 0.8)');
            line.setAttribute('stroke-width', '4');
            line.setAttribute('stroke-dasharray', '8,8');
            line.setAttribute('stroke-linecap', 'round');
            
            // Animate line drawing
            line.style.strokeDasharray = distance + ' ' + distance;
            line.style.strokeDashoffset = distance;
            svgLayer.appendChild(line);
            
            const drawAnim = line.animate([
                { strokeDashoffset: distance },
                { strokeDashoffset: 0 }
            ], {
                duration: 350,
                easing: 'ease-out',
                fill: 'forwards'
            });
            
            // 2. SHOOT PHASE
            drawAnim.onfinish = () => {
                proj.style.display = 'block';
                proj.style.left = startX + 'px';
                proj.style.top = startY + 'px';
                
                // Animate ball projectile
                const anim = proj.animate([
                    { transform: `translate(-50%, -50%) scale(1)` },
                    { transform: `translate(calc(${dx}px - 50%), calc(${dy}px - 50%)) scale(0.5)` }
                ], {
                    duration: 250, // Bullet speed
                    easing: 'ease-in'
                });
                
                anim.onfinish = () => {
                    proj.style.display = 'none';
                    svgLayer.innerHTML = ''; // Clear SVG lines
                    
                    // Restore original group
                    origGroup.style.opacity = '1';
                    
                    // Pop animation for bubble
                    element.animate([
                        { filter: 'brightness(1)', transform: 'scale(1)' },
                        { filter: 'brightness(1.5)', transform: 'scale(1.2)' },
                        { filter: 'brightness(1)', transform: 'scale(1)' }
                    ], { duration: 300 });
                    
                    setTimeout(() => { isShooting = false; }, 300);
                };
            };
        }
    </script>
